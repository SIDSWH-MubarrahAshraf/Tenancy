<div class="erp-container">
  <header class="erp-page-header">
    <div class="title-group">
      <div class="title-icon">
        <svg viewBox="0 0 24 24" aria-hidden="true" style="width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2.5;">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
          <polyline points="22,6 12,13 2,6" />
        </svg>
      </div>
      <div class="d-flex align-items-center">
        <h1>Company Email</h1>
        <span *ngIf="statusMessage" class="text-success ms-3" style="font-size: 13px; font-weight: 600;">
          {{ statusMessage }}
        </span>
      </div>
    </div>
  </header>

  <form
    #emailForm="ngForm"
    (ngSubmit)="saveEmailSetup(emailForm)"
    novalidate>

    <!-- Main Parent Card -->
    <div class="erp-card" style="padding: 0 !important; overflow: hidden;">

      <div class="card-body p-4">
        <!-- SMTP Settings directly in parent card body -->
        <div class="row g-4">
          <div class="col-lg-6">
            <label class="form-label required">Email Host</label>
            <input
              type="text"
              class="form-control"
              name="emailHost"
              [(ngModel)]="email.emailHost"
              placeholder="smtp.gmail.com"
              required
              [disabled]="isReadOnly || isSaving || isTesting">
          </div>
          <div class="col-lg-6">
            <label class="form-label required">Email Port</label>
            <input
              type="number"
              class="form-control"
              name="emailPort"
              [(ngModel)]="email.emailPort"
              placeholder="587"
              required
              [disabled]="isReadOnly || isSaving || isTesting">
          </div>
        </div>

        <!-- ROW 2 -->
        <div class="row g-4 mt-1">
          <div class="col-lg-6">
            <label class="form-label required">Email User</label>
            <input
              type="text"
              class="form-control"
              name="emailUser"
              [(ngModel)]="email.emailUser"
              placeholder="Enter Email User"
              required
              [disabled]="isReadOnly || isSaving || isTesting">
          </div>
          <div class="col-lg-6">
            <label class="form-label required">Email Password</label>
            <input
              type="password"
              class="form-control"
              name="emailPassword"
              [(ngModel)]="email.emailPassword"
              placeholder="Enter Password"
              required
              [disabled]="isReadOnly || isSaving || isTesting">
          </div>
        </div>

        <!-- ROW 3 -->
        <div class="row g-4 mt-1 align-items-end">
          <div class="col-lg-5">
            <label class="form-label required">Email From Address</label>
            <input
              type="email"
              class="form-control"
              name="emailFromAddress"
              [(ngModel)]="email.emailFromAddress"
              placeholder="noreply@company.com"
              required
              [disabled]="isReadOnly || isSaving || isTesting">
          </div>
          <div class="col-lg-5">
            <label class="form-label">CC Email</label>
            <input
              type="text"
              class="form-control"
              name="emailCcAddress"
              [(ngModel)]="email.emailCcAddress"
              placeholder="e.g. cc@company.com, info@company.com"
              [disabled]="isReadOnly || isSaving || isTesting">
          </div>
          <div class="col-lg-2">
            <label class="form-label d-block mb-2">Enable SSL</label>
            <div class="status-toggle-wrapper" style="height: 38px;">
              <label class="switch" for="emailSslSwitch">
                <input
                  type="checkbox"
                  id="emailSslSwitch"
                  name="enableSsl"
                  [(ngModel)]="email.enableSsl"
                  [disabled]="isReadOnly || isSaving || isTesting"
                >
                <span class="slider round"></span>
              </label>
            </div>
          </div>
        </div>

        <!-- Settings buttons directly here -->
        <div class="text-end mt-4 pt-3 border-top" style="border-color: rgba(207, 165, 234, 0.25) !important;">
          <button *ngIf="!email.id" type="submit" [disabled]="isSaving || isTesting" class="btn erp-btn-success me-2">
            <svg viewBox="0 0 24 24" aria-hidden="true" style="width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2.5;"><path d="M12 5v14M5 12h14"></path></svg>
            {{ isSaving ? 'Adding...' : 'Add' }}
          </button>
          
          <!-- Edit/Update Actions -->
          <ng-container *ngIf="email.id">
            <button *ngIf="isReadOnly" type="button" [disabled]="isSaving || isTesting" class="btn erp-btn-info me-2" (click)="enableEditing()">
              <svg viewBox="0 0 24 24" aria-hidden="true" style="width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2.5;"><path d="M12 20h9"></path><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"></path></svg>
              Update
            </button>
            
            <button *ngIf="!isReadOnly" type="button" [disabled]="isSaving || isTesting" class="btn erp-btn-success me-2" (click)="updateEmailSetup()">
              <svg viewBox="0 0 24 24" aria-hidden="true" style="width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2.5;"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><path d="M17 21v-8H7v8M7 3v5h8"></path></svg>
              {{ isSaving ? 'Saving...' : 'Save Changes' }}
            </button>
            
            <button *ngIf="!isReadOnly" type="button" [disabled]="isSaving || isTesting" class="btn btn-secondary" (click)="cancelEditing()">
              Cancel
            </button>
          </ng-container>
        </div>

        <div style="margin: 28px 0;"></div>

        <!-- Nested Card 2: Test Connection is kept inside the parent card -->
        <div class="card" style="border: 1px solid var(--erp-border); border-radius: var(--erp-radius); background: #ffffff; box-shadow: var(--erp-shadow-sm); overflow: hidden;">
          <div class="card-header" style="background: var(--erp-header-bg); border-bottom: 1px solid var(--erp-border); padding: 14px 20px; margin: 0 !important;">
            <h5 style="margin: 0; font-size: 14px; font-weight: 700; color: var(--erp-text);">Test Connection</h5>
          </div>

          <div class="card-body p-4">
            <div class="row align-items-end">
              <div class="col-lg-9">
                <label class="form-label">Test Email Address</label>
                <input
                  type="email"
                  class="form-control"
                  name="testEmail"
                  [(ngModel)]="email.testEmail"
                  placeholder="Enter Test Email Address"
                  [disabled]="isSaving || isTesting">
              </div>
              <div class="col-lg-3">
                <button type="button" [disabled]="isSaving || isTesting" class="btn erp-btn-primary w-100" (click)="sendTestEmail()">
                  <svg viewBox="0 0 24 24" aria-hidden="true" style="width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2.5;"><path d="m22 2-7 20-4-9-9-4Z"></path><path d="M22 2 11 13"></path></svg>
                  {{ isTesting ? 'Sending...' : 'Send Test Email' }}
                </button>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>

  </form>

</div>
