<div class="erp-container">
  <header class="erp-page-header">
    <div class="title-group">
      <div class="title-icon">
        <svg viewBox="0 0 24 24" aria-hidden="true" style="width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2.5;">
          <rect x="3" y="3" width="7" height="9" />
          <rect x="14" y="3" width="7" height="5" />
          <rect x="14" y="12" width="7" height="9" />
          <rect x="3" y="16" width="7" height="5" />
        </svg>
      </div>
      <h1>Department</h1>
    </div>
  </header>

  <form #departmentForm="ngForm" (ngSubmit)="onSave(departmentForm)" novalidate>

    <div class="erp-card">

      <div class="card-body">

        <!-- Row 1: Department ID (with attached search/refresh) + Department Name -->
        <div class="erp-toolbar">

          <div class="field-id">
            <div class="input-attached">
              <input
                type="text"
                class="erp-input"
                name="departmentId"
                [(ngModel)]="department.departmentId"
                placeholder="Department ID">

              <button
                type="button"
                class="attached-btn"
                title="Search"
                (click)="searchDepartment()">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <circle cx="11" cy="11" r="7"></circle>
                  <path d="m16.5 16.5 4 4"></path>
                </svg>
              </button>

              <button
                type="button"
                class="attached-btn"
                title="Refresh"
                (click)="refreshForm()">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M21 12a9 9 0 1 1-2.64-6.36"></path>
                  <path d="M21 3v6h-6"></path>
                </svg>
              </button>
            </div>
          </div>

          <div class="field-name">
            <input
              type="text"
              class="erp-input"
              name="departmentName"
              [(ngModel)]="department.departmentName"
              placeholder="Department Name">
          </div>

        </div>

        <!-- Row 2: Save / Delete -->
        <div class="erp-actions-row">
          <button type="submit" class="text-btn primary" title="Save">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
              <path d="M17 21v-8H7v8M7 3v5h8"></path>
            </svg>
            Save
          </button>

          <button
            type="button"
            class="text-btn danger"
            title="Delete"
            (click)="deleteDepartment()">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6M10 11v6M14 11v6"></path>
            </svg>
            Delete
          </button>
        </div>

      </div>

    </div>

  </form>

</div>
