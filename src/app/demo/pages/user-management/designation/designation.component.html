<div class="erp-container">
  <header class="erp-page-header">
    <div class="title-group">
      <div class="title-icon">
        <svg viewBox="0 0 24 24" aria-hidden="true" style="width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2.5;">
          <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
          <circle cx="9" cy="7" r="4" />
          <path d="M22 10V6M22 14v-2" />
        </svg>
      </div>
      <h1>Designation</h1>
    </div>
  </header>

  <form
    #designationForm="ngForm"
    (ngSubmit)="onSave(designationForm)"
    novalidate>

    <div class="erp-card">

      <div class="card-body">

        <!-- ROW 1: Department ID (attached search) + Department Name -->
        <div class="row g-3 mb-4">

          <div class="col-lg-5">
            <label class="form-label required">Department ID</label>

            <div class="input-attached">
              <input
                type="text"
                class="form-control"
                name="departmentId"
                [(ngModel)]="designation.departmentId"
                placeholder="Enter Department ID"
                readonly>

              <button
                type="button"
                class="attached-btn"
                title="Search Department"
                (click)="searchDepartment()">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <circle cx="11" cy="11" r="7"></circle>
                  <path d="m16.5 16.5 4 4"></path>
                </svg>
              </button>
            </div>
          </div>

          <div class="col-lg-7">
            <label class="form-label">Department Name</label>
            <input
              type="text"
              class="form-control"
              name="departmentName"
              [(ngModel)]="designation.departmentName"
              readonly>
          </div>

        </div>

        <!-- ROW 2: Designation ID (attached search + refresh) + Designation Name -->
        <div class="row g-3">

          <div class="col-lg-5">
            <label class="form-label required">Designation ID</label>

            <div class="input-attached">
              <input
                type="text"
                class="form-control"
                name="designationId"
                [(ngModel)]="designation.designationId"
                placeholder="Enter Designation ID"
                required>

              <button
                type="button"
                class="attached-btn"
                title="Search"
                (click)="searchDesignation()">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <circle cx="11" cy="11" r="7"></circle>
                  <path d="m16.5 16.5 4 4"></path>
                </svg>
              </button>

              <button
                type="button"
                class="attached-btn"
                title="Refresh"
                (click)="refreshForm()">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M21 12a9 9 0 1 1-2.64-6.36"></path>
                  <path d="M21 3v6h-6"></path>
                </svg>
              </button>
            </div>
          </div>

          <div class="col-lg-7">
            <label class="form-label required">Designation Name</label>
            <input
              type="text"
              class="form-control"
              name="designationName"
              [(ngModel)]="designation.designationName"
              placeholder="Enter Designation Name"
              required>
          </div>

        </div>

      </div>

      <div class="card-footer text-end">

        <button type="submit" class="btn erp-btn-primary me-2">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
            <path d="M17 21v-8H7v8M7 3v5h8"></path>
          </svg>
          Add
        </button>

        <button
          type="button"
          class="btn erp-btn-danger"
          (click)="deleteDesignation()">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6M10 11v6M14 11v6"></path>
          </svg>
          Delete
        </button>

      </div>

    </div>

  </form>

</div>
