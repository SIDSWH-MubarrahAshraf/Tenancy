<div class="erp-container full-width">
  <header class="erp-page-header">
    <div class="title-group">
      <div class="title-icon">
        <svg viewBox="0 0 24 24" aria-hidden="true" style="width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2.5;">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
          <polyline points="14 2 14 8 20 8" />
          <line x1="16" y1="13" x2="8" y2="13" />
          <line x1="16" y1="17" x2="8" y2="17" />
          <polyline points="10 9 9 9 8 9" />
        </svg>
      </div>
      <h1>Document Setup</h1>
    </div>
  </header>
  <!-- ================= MAIN CARD ================= -->
  <div class="erp-card full-width-card">

    <div class="card-body">

      <!-- ================= TABLE ================= -->
      <div class="table-wrapper">

        <table class="erp-table full-table">

          <thead>
            <tr>
              <th width="80" class="text-center">#Sr</th>
              <th style="width: 35% !important; min-width: 250px;">Module Name</th>
              <th width="120">Length</th>
              <th width="120">Prefix</th>
              <th width="140">Number</th>
              <th width="100" class="text-center">Actions</th>
            </tr>
          </thead>

          <tbody>

            <tr *ngFor="let module of filteredModules; let i = index">

              <td class="text-center">
                <span class="serial-badge">
                  {{ i + 1 }}
                </span>
              </td>

              <td>
                <strong style="color: var(--erp-text); font-size: 14px;">{{ module.moduleName }}</strong>
              </td>

              <td>
                <span class="badge-length">{{ module.length }}</span>
              </td>

              <td>
                <span class="badge-prefix">{{ module.prefix }}</span>
              </td>

              <td>
                {{ module.number }}
              </td>

              <td class="text-center">
                <button
                  type="button"
                  class="icon-action warning"
                  (click)="editModule(module)"
                  title="Edit"
                >
                  <svg viewBox="0 0 24 24" aria-hidden="true" style="width: 14px; height: 14px; fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round;">
                    <path d="M12 20h9" />
                    <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" />
                  </svg>
                </button>
              </td>

            </tr>

            <tr *ngIf="filteredModules.length === 0">
              <td colspan="6" class="empty-state">
                No records found.
              </td>
            </tr>

          </tbody>

        </table>

      </div>

    </div>
  </div>

  <!-- ================= EDIT MODAL ================= -->
  <div
    class="modal fade show"
    *ngIf="showEditModal"
    tabindex="-1"
    style="display:block;background:rgba(0,0,0,.5)">

    <div class="modal-dialog modal-dialog-centered">

      <div class="modal-content">

        <div class="modal-header">
          <h5 class="modal-title">Edit Document Number</h5>
          <button type="button" class="btn-close" (click)="closeModal()"></button>
        </div>

        <div class="modal-body">
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">Module Name</label>
              <input
                class="form-control"
                [(ngModel)]="selectedModule.moduleName"
                readonly>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Length</label>
              <input
                type="number"
                class="form-control"
                [(ngModel)]="selectedModule.length">
            </div>
          </div>
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">Prefix</label>
              <input
                class="form-control"
                [(ngModel)]="selectedModule.prefix">
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Number</label>
              <input
                type="number"
                class="form-control"
                [(ngModel)]="selectedModule.number">
            </div>
          </div>
        </div>

        <div class="modal-footer">

          <button
            type="button"
            class="btn erp-btn-danger"
            (click)="closeModal()">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M18 6 6 18M6 6l12 12"></path>
            </svg>
            Cancel
          </button>

          <button
            type="button"
            class="btn erp-btn-success"
            (click)="saveModule()">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
              <path d="M17 21v-8H7v8M7 3v5h8"></path>
            </svg>
            Save
          </button>

        </div>

      </div>

    </div>

  </div>

</div>
