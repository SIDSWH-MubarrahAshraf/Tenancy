<div class="services-shell">
  <form #serviceForm="ngForm" novalidate>

    <div class="service-card">
      <header class="services-header">
        <div class="title-group d-flex align-items-center gap-2">
          <div class="title-icon d-flex align-items-center justify-content-center" style="width: 36px; height: 36px; border-radius: 8px; background: var(--erp-primary-soft); color: var(--erp-primary);">
            <svg viewBox="0 0 24 24" aria-hidden="true" style="width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2;">
              <path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z" />
              <path d="M19.4 15a1.7 1.7 0 0 0 .34 1.88l.04.04a2 2 0 1 1-2.83 2.83l-.04-.04A1.7 1.7 0 0 0 15 19.4a1.7 1.7 0 0 0-1 .6 1.7 1.7 0 0 0-.34 1.88V22a2 2 0 1 1-4 0v-.12A1.7 1.7 0 0 0 8.6 20a1.7 1.7 0 0 0-1.88-.34l-.12.06a2 2 0 1 1-2-3.46l.1-.06A1.7 1.7 0 0 0 5.4 15a1.7 1.7 0 0 0-.6-1 1.7 1.7 0 0 0-1.88-.34H2.8a2 2 0 1 1 0-4h.12A1.7 1.7 0 0 0 4.8 8.6a1.7 1.7 0 0 0-.34-1.88l-.04-.04A2 2 0 1 1 7.25 3.85l.04.04A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1-.6 1.7 1.7 0 0 0 .34-1.88V2a2 2 0 1 1 4 0v.12A1.7 1.7 0 0 0 15.4 4a1.7 1.7 0 0 0 1.88.34l.12-.06a2 2 0 1 1 2 3.46l-.1.06A1.7 1.7 0 0 0 18.6 9a1.7 1.7 0 0 0 .6 1 1.7 1.7 0 0 0 1.88.34h.12a2 2 0 1 1 0 4h-.12A1.7 1.7 0 0 0 19.4 15z" />
            </svg>
          </div>
          <h1 style="font-size: 1.15rem; font-weight: 700; color: var(--erp-text); margin: 0; letter-spacing: 0.5px;">Service Management</h1>
        </div>

        <div class="status-toggle-wrapper">
          <span class="toggle-text" [class.is-inactive]="!isActive">{{ isActive ? 'Active' : 'Inactive' }}</span>
          <label class="switch" for="serviceActiveSwitch">
            <input type="checkbox" id="serviceActiveSwitch" [checked]="isActive" (change)="toggleActive()">
            <span class="slider round"></span>
          </label>
        </div>
      </header>

      <div class="card-body">

        <!-- ROW 1: Service Mode alone -->
        <div class="form-row form-row--single">
          <div class="field">
            <span>Service Mode <b>*</b></span>
            <div style="position: relative; width: 100%;">
              <button
                type="button"
                (click)="toggleServiceModeDropdown()"
                class="custom-dropdown-btn"
              >
                <span>{{ getServiceModeLabel() }}</span>
                <svg viewBox="0 0 24 24" class="chevron-down-svg">
                  <path d="m6 9 6 6 6-6" />
                </svg>
              </button>
              
              <!-- Custom Dropdown Popup -->
              <div *ngIf="showServiceModeDropdown" class="custom-dropdown-popup">
                <div
                  *ngFor="let mode of serviceModes"
                  class="dropdown-item-select"
                  (click)="selectServiceMode(mode.value)">
                  {{ mode.label }}
                </div>
              </div>
            </div>

            <!-- Hidden input for Angular Form Validation -->
            <input
              type="hidden"
              name="serviceMode"
              [(ngModel)]="model.serviceMode"
              #serviceModeRef="ngModel"
              required
            >
            <small *ngIf="serviceModeRef.invalid && serviceModeRef.touched">Service mode is required.</small>
          </div>
        </div>

        <!-- ROW 2: Service Type (with attached Search) + Description -->
        <div class="form-row form-row--two">
          <div class="field" style="position: relative; width: 100%;">
            <span>Service Type <b>*</b></span>
            <div class="input-attached">
              <input
                type="text"
                id="serviceType"
                name="serviceType"
                placeholder="e.g. SVC-001"
                [(ngModel)]="model.serviceType"
                #serviceTypeRef="ngModel"
                required
                maxlength="50"
              />
              <button type="button" class="attached-btn" [disabled]="loadingServices" title="Search Services" (click)="searchService()">
                <span *ngIf="loadingServices" class="spinner-border spinner-border-sm" role="status" aria-hidden="true" style="color: #ffffff; width: 14px; height: 14px; border-width: 0.15em; margin: 0;"></span>
                <svg *ngIf="!loadingServices" viewBox="0 0 24 24" aria-hidden="true">
                  <circle cx="11" cy="11" r="7" />
                  <path d="m16.5 16.5 4 4" />
                </svg>
              </button>
            </div>
            <small *ngIf="serviceTypeRef.invalid && serviceTypeRef.touched">Service type is required.</small>
          </div>

          <label class="field">
            <span>Description</span>
            <input
              type="text"
              id="description"
              name="description"
              placeholder="Describe this service type"
              [(ngModel)]="model.description"
            />
          </label>
        </div>

        <!-- ROW 3: Revenue Account -->
        <div class="account-row">
          <div class="account-panel">
            <label class="field account-code">
              <span>Revenue Account</span>
              <div class="input-attached">
                <input
                  type="text"
                  id="revenueAccountCode"
                  name="revenueAccountCode"
                  placeholder="Code"
                  [(ngModel)]="model.revenueAccountCode"
                  (blur)="resolveAccountName('revenue')"
                />
                <button type="button" class="attached-btn" title="Search Revenue Account" (click)="onLookup('revenue')">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <circle cx="11" cy="11" r="7" />
                    <path d="m16.5 16.5 4 4" />
                  </svg>
                </button>
              </div>
            </label>

            <div class="account-name-col">
              <span class="account-name-spacer" aria-hidden="true">&nbsp;</span>
              <div class="account-name">{{ model.revenueAccountName || 'Select an account...' }}</div>
            </div>
          </div>

          <label class="recurring-check" *ngIf="model.serviceMode === 'rent'">
            <input
              type="checkbox"
              id="recurringEntry"
              name="recurringEntry"
              [(ngModel)]="model.recurringEntry"
            />
            <span>Recurring entry</span>
          </label>
        </div>

        <!-- ROW 4: Recurring Account -->
        <div class="account-row" *ngIf="model.serviceMode === 'rent' && model.recurringEntry">
          <div class="account-panel">
            <label class="field account-code">
              <span>Recurring Account</span>
              <div class="input-attached">
                <input
                  type="text"
                  id="recurringAccountCode"
                  name="recurringAccountCode"
                  placeholder="Code"
                  [(ngModel)]="model.recurringAccountCode"
                  (blur)="resolveAccountName('recurring')"
                />
                <button type="button" class="attached-btn" title="Search Recurring Account" (click)="onLookup('recurring')">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <circle cx="11" cy="11" r="7" />
                    <path d="m16.5 16.5 4 4" />
                  </svg>
                </button>
              </div>
            </label>

            <div class="account-name-col">
              <span class="account-name-spacer" aria-hidden="true">&nbsp;</span>
              <div class="account-name">{{ model.recurringAccountName || 'Select an account...' }}</div>
            </div>
          </div>
        </div>

      </div>

      <!-- Footer Actions -->
      <div class="card-actions">
        <div style="display: flex; gap: 8px;">
          <button type="button" class="action-btn danger" [disabled]="!selectedServiceId" (click)="onDelete()">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6M10 11v6M14 11v6" />
            </svg>
            Delete
          </button>
          
          <button type="button" class="action-btn secondary" (click)="onClose()">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M18 6 6 18M6 6l12 12" />
            </svg>
            Close
          </button>
        </div>
        <div style="display: flex; gap: 8px;">
          <!-- Clear Button -->
          <button type="button" class="action-btn" (click)="clearForm()" style="background: #e3a008; border-color: #e3a008; color: #ffffff;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 14px; height: 14px; margin-right: 4px;">
              <path d="M21.5 2v6h-6" />
              <path d="M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67" />
            </svg>
            Clear Form
          </button>
          
          <!-- Save Button (POST) -->
          <button type="button" class="action-btn primary" (click)="saveNewService(serviceForm)">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 5v14M5 12h14" />
            </svg>
            Save
          </button>

          <!-- Save Changes Button (PUT) -->
          <button type="button" class="action-btn success" [disabled]="!selectedServiceId" (click)="saveChanges(serviceForm)" style="background: #2E7D32; border-color: #2E7D32; color: #ffffff;">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" />
              <path d="M17 21v-8H7v8M7 3v5h8" />
            </svg>
            Save Changes
          </button>
        </div>
      </div>

    </div>
  </form>

  <div class="erp-toast" [class.erp-toast--show]="toast.visible" [class.erp-toast--danger]="toast.type === 'danger'">
    {{ toast.message }}
  </div>
</div>
