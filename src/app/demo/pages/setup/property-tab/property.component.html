<div class="property-tab">
  <section class="property-card">
    <div class="card-header">
      <div>
        <h2>Property Details</h2>
      </div>
    </div>

    <div class="card-body">
      <div class="property-form-grid mb-4">
        <div class="field">
          <span>Property ID</span>
          <div style="position: relative; width: 100%;">
            <div class="d-flex align-items-stretch" style="border: 1px solid var(--erp-border, #CFA5EA); border-radius: 7px; overflow: hidden; background: #fbfaff; height: 38px; width: 100%;">
              <input type="text" [ngModel]="propertyId" (ngModelChange)="onPropertyIdChange($event)" placeholder="Enter Property Code" style="border: none !important; background: transparent; height: 100%; flex-grow: 1; padding: 0 11px; font-size: 0.86rem; color: var(--erp-text, #2f3542); outline: none; margin: 0; box-shadow: none;">
              
              <!-- Search Button -->
              <button type="button" (click)="searchProperty()" [disabled]="loadingProperties" title="Search Property" style="width: 38px; height: 100%; background: var(--erp-primary, #8E24AA); border: none !important; color: #ffffff; display: flex; align-items: center; justify-content: center; flex-shrink: 0; cursor: pointer; transition: opacity 0.2s; margin: 0; border-radius: 0;">
                <span *ngIf="loadingProperties" class="spinner-border spinner-border-sm" role="status" aria-hidden="true" style="color: #ffffff; width: 14px; height: 14px; border-width: 0.15em; margin: 0;"></span>
                <svg *ngIf="!loadingProperties" viewBox="0 0 24 24" aria-hidden="true" style="width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2.5;">
                  <circle cx="11" cy="11" r="7" />
                  <path d="m16.5 16.5 4 4" />
                </svg>
              </button>

              <!-- Refresh (Clear) Button (Yellow) -->
              <button type="button" (click)="clearPropertyForm()" title="Clear Form" style="width: 38px; height: 100%; background: #e3a008; border: none !important; color: #ffffff; display: flex; align-items: center; justify-content: center; flex-shrink: 0; cursor: pointer; transition: background 0.2s; margin: 0; border-radius: 0;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width: 16px; height: 16px;">
                  <path d="M21.5 2v6h-6" />
                  <path d="M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67" />
                </svg>
              </button>
            </div>
          </div>
        </div>

        <label class="field">
          <span>Property Name</span>
          <input type="text" [(ngModel)]="propertyName" placeholder="Enter Property Name">
        </label>

        <div class="field">
          <span>Property Type</span>
          <div style="position: relative; width: 100%;">
            <button type="button" (click)="toggleTypeDropdown()" style="width: 100%; height: 38px; padding: 0 11px; border: 1px solid var(--erp-border, #CFA5EA); border-radius: 7px; background: #fbfaff; color: var(--erp-text, #2f3542); font-size: 0.86rem; text-align: left; display: flex; align-items: center; justify-content: space-between; cursor: pointer; margin: 0; outline: none; box-shadow: none;">
              <span>{{ propertyType || 'Select Property Type' }}</span>
              <svg viewBox="0 0 24 24" style="width: 14px; height: 14px; fill: none; stroke: currentColor; stroke-width: 2.5; margin-left: 8px;">
                <path d="m6 9 6 6 6-6" />
              </svg>
            </button>
            
            <!-- Custom Dropdown Popup -->
            <div *ngIf="showTypeDropdown" class="search-popup-dropdown" style="position: absolute; top: 43px; left: 0; width: 100%; background: #ffffff; border: 1px solid var(--erp-border, #CFA5EA); border-radius: 8px; box-shadow: 0 8px 24px rgba(142, 36, 170, 0.15); z-index: 1000; padding: 6px;">
              <div class="dropdown-item-select" (click)="selectPropertyType('Residential')">Residential</div>
              <div class="dropdown-item-select" (click)="selectPropertyType('Commercial')">Commercial</div>
              <div class="dropdown-item-select" (click)="selectPropertyType('Industrial')">Industrial</div>
            </div>
          </div>
        </div>

        <label class="field">
          <span>Property Area</span>
          <input type="text" [(ngModel)]="propertyArea" placeholder="Enter Property Area">
        </label>

        <div class="field">
          <span>Property Country</span>
          <div style="position: relative; width: 100%;">
            <button type="button" (click)="toggleCountryDropdown()" style="width: 100%; height: 38px; padding: 0 11px; border: 1px solid var(--erp-border, #CFA5EA); border-radius: 7px; background: #fbfaff; color: var(--erp-text, #2f3542); font-size: 0.86rem; text-align: left; display: flex; align-items: center; justify-content: space-between; cursor: pointer; margin: 0; outline: none; box-shadow: none;">
              <span>{{ propertyCountry || 'Select Country' }}</span>
              <svg viewBox="0 0 24 24" style="width: 14px; height: 14px; fill: none; stroke: currentColor; stroke-width: 2.5; margin-left: 8px;">
                <path d="m6 9 6 6 6-6" />
              </svg>
            </button>
            
            <!-- Custom Dropdown Popup -->
            <div *ngIf="showCountryDropdown" class="search-popup-dropdown" style="position: absolute; top: 43px; left: 0; width: 100%; background: #ffffff; border: 1px solid var(--erp-border, #CFA5EA); border-radius: 8px; box-shadow: 0 8px 24px rgba(142, 36, 170, 0.15); z-index: 1000; padding: 6px;">
              <div class="dropdown-item-select" (click)="selectPropertyCountry('UAE')">UAE</div>
            </div>
          </div>
        </div>

        <label class="field">
          <span>Property City</span>
          <input type="text" [(ngModel)]="propertyCity" placeholder="Enter Property City">
        </label>

        <label class="field">
          <span>Plot No</span>
          <input type="text" [(ngModel)]="plotNo" placeholder="Enter Plot Number">
        </label>

        <label class="field">
          <span>Property Makani</span>
          <input type="text" [(ngModel)]="propertyMakani" placeholder="Enter Makani Number">
        </label>
      </div>

      <hr style="border: 0; border-top: 1px solid var(--erp-border); margin: 24px 0;">

      <!-- Dotted upload area directly inside the parent card -->
      <div class="property-upload-card mb-4" style="border: 2px dashed var(--erp-border); border-radius: var(--erp-radius); padding: 24px; text-align: center; background: var(--erp-primary-soft);">
        <div class="upload-icon mb-2" style="color: var(--erp-primary);">
          <svg viewBox="0 0 24 24" aria-hidden="true" style="width: 32px; height: 32px; fill: none; stroke: currentColor; stroke-width: 2.5;">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
            <path d="M17 8 12 3 7 8" />
            <path d="M12 3v12" />
          </svg>
        </div>
        <div class="upload-title" style="font-weight: 700; font-size: 14px; color: var(--erp-text);">Upload Property Document</div>
        <div class="upload-subtitle mb-3" style="font-size: 12px; color: var(--erp-muted);">Upload lease agreements, title deeds or any supporting documents.</div>
        <button class="btn erp-btn-success py-1 px-3 d-inline-flex align-items-center gap-2" type="button" (click)="fileInput.click()" style="height: 34px; font-size: 13px; margin: 0 auto;">
          <svg viewBox="0 0 24 24" aria-hidden="true" style="width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2.5;">
            <path d="M12 5v14M5 12h14" />
          </svg>
          Browse Files
        </button>
        <input hidden #fileInput type="file" (change)="onFileSelected($event)">
      </div>

      <div class="table-responsive">
        <table class="documents-table">
          <thead>
            <tr>
              <th>Document</th>
              <th>Uploaded Date</th>
              <th class="actions-cell">Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngIf="documents.length === 0">
              <td colspan="3" class="empty-cell">No documents uploaded.</td>
            </tr>
            <tr *ngFor="let doc of documents">
              <td>
                <div class="document-name">
                  <span class="document-icon">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                      <path d="M14 2v6h6M8 13h8M8 17h5" />
                    </svg>
                  </span>
                  {{ doc.name }}
                </div>
              </td>
              <td>{{ doc.uploadDate }}</td>
              <td class="actions-cell">
                <button type="button" class="icon-action" (click)="viewDocument(doc)" title="View">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z" />
                    <circle cx="12" cy="12" r="3" />
                  </svg>
                </button>
                <button type="button" class="icon-action success" (click)="downloadDocument(doc)" title="Download">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                    <path d="M7 10l5 5 5-5" />
                    <path d="M12 15V3" />
                  </svg>
                </button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </section>

  <footer class="property-actions">
    <button type="button" class="action-btn danger" (click)="deleteProperty()">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6M10 11v6M14 11v6" />
      </svg>
      Delete Property
    </button>

    <!-- Success Status Message Indicator -->
    <span *ngIf="statusMessage" style="color: #2E7D32; font-size: 0.86rem; font-weight: 700; display: inline-flex; align-items: center; gap: 6px;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width: 16px; height: 16px;">
        <path d="M20 6 9 17l-5-5" />
      </svg>
      {{ statusMessage }}
    </span>

    <div style="display: flex; gap: 8px;">
      <button type="button" class="action-btn primary" (click)="saveProperty()">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" />
          <path d="M17 21v-8H7v8M7 3v5h8" />
        </svg>
        Save Property
      </button>

      <button type="button" class="action-btn success" (click)="saveChanges()" [disabled]="!propertyKey" style="background: #2E7D32; border-color: #2E7D32; color: #ffffff;">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" />
          <path d="M17 21v-8H7v8M7 3v5h8" />
        </svg>
        Save Changes
      </button>
    </div>
  </footer>

</div>
