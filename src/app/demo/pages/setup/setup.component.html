<div class="setup-shell">
  <header class="erp-page-header">
    <div class="title-group">
      <div class="title-icon">
        <svg viewBox="0 0 24 24" aria-hidden="true" style="width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2.5;">
          <path d="M3 21h18M5 21V8l7-4 7 4v13M9 21v-6h6v6M9 10h.01M12 10h.01M15 10h.01" />
        </svg>
      </div>
      <div>
        <h1>Property Setup</h1>
      </div>
    </div>

    <div class="header-controls">
      <div class="status-toggle-wrapper">
        <span class="toggle-text" [class.is-inactive]="!isActive">{{ isActive ? 'Active' : 'Inactive' }}</span>
        <label class="switch" for="masterActiveSwitch">
          <input type="checkbox" id="masterActiveSwitch" [(ngModel)]="isActive">
          <span class="slider round"></span>
        </label>
      </div>
    </div>
  </header>

  <section class="tabs-card">
    <div class="tabs-bar">
      <button
        type="button"
        class="tab-button"
        [class.active]="activeTab === 'property'"
        (click)="setTab('property')"
      >
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M3 10.5 12 3l9 7.5V21H5a2 2 0 0 1-2-2z" />
          <path d="M9 21v-7h6v7" />
        </svg>
        Property Details
      </button>

      <button
        type="button"
        class="tab-button"
        [class.active]="activeTab === 'unit'"
        (click)="setTab('unit')"
      >
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <rect x="3" y="3" width="7" height="7" />
          <rect x="14" y="3" width="7" height="7" />
          <rect x="3" y="14" width="7" height="7" />
          <rect x="14" y="14" width="7" height="7" />
        </svg>
        Units Details
      </button>
    </div>

    <div class="tab-content">
      <app-property *ngIf="activeTab === 'property'" [inactive]="!isActive" (inactiveChange)="isActive = !$event" [(propertyId)]="propertyId"></app-property>
      <app-unit *ngIf="activeTab === 'unit'" [propertyId]="propertyId"></app-unit>
    </div>
  </section>
</div>
