<div class="setup-shell">
  <header class="setup-header">
    <div class="title-group">
      <div class="title-icon">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M3 21h18M5 21V8l7-4 7 4v13M9 21v-6h6v6M9 10h.01M12 10h.01M15 10h.01" />
        </svg>
      </div>
      <div>
        <h1>Property Setup</h1>
      </div>
    </div>

    <div class="header-controls">
      <label class="property-search">
        <span>Property ID</span>
        <div class="search-row">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="11" cy="11" r="7" />
            <path d="m16.5 16.5 4 4" />
          </svg>
          <input type="text" [(ngModel)]="propertyId" placeholder="Enter Property Code">
          <button type="button" title="Search" (click)="onSearch()">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M5 12h14M13 6l6 6-6 6" />
            </svg>
          </button>
        </div>
      </label>

      <button type="button" class="new-property-btn" title="New Property" (click)="onNew()">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 5v14M5 12h14" />
        </svg>
      </button>

      <div class="status-toggle-wrapper">
        <span class="toggle-text" [class.is-inactive]="inactive">{{ inactive ? 'Inactive' : 'Active' }}</span>
        <label class="switch" for="masterInactiveSwitch">
          <input type="checkbox" id="masterInactiveSwitch" [(ngModel)]="inactive">
          <span class="slider round"></span>
        </label>
      </div>
    </div>
  </header>

  <section class="tabs-card">
    <div class="tabs-bar">
      <button
        type="button"
        class="tab-button"
        [class.active]="activeTab === 'property'"
        (click)="setTab('property')"
      >
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M3 10.5 12 3l9 7.5V21H5a2 2 0 0 1-2-2z" />
          <path d="M9 21v-7h6v7" />
        </svg>
        Property Details
      </button>

      <button
        type="button"
        class="tab-button"
        [class.active]="activeTab === 'unit'"
        (click)="setTab('unit')"
      >
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <rect x="3" y="3" width="7" height="7" />
          <rect x="14" y="3" width="7" height="7" />
          <rect x="3" y="14" width="7" height="7" />
          <rect x="14" y="14" width="7" height="7" />
        </svg>
        Units List
      </button>
    </div>

    <div class="tab-content">
      <app-property *ngIf="activeTab === 'property'"></app-property>
      <app-unit *ngIf="activeTab === 'unit'"></app-unit>
    </div>
  </section>
</div>
