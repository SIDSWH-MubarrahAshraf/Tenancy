<div class="erp-container">
  <!-- Page Header -->
  <header class="erp-header-card mb-4">
    <div class="header-main-row">
      <!-- Title Section -->
      <div class="header-title-section">
        <div class="header-icon-box">
          <!-- Inline Building Estate SVG Icon -->
          <svg xmlns="http://www.w3.org/2000/svg" class="icon-svg-lg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 21h18M5 21V7l8-3v17M19 21v-8h-6M9 9h2M9 13h2M9 17h2"/>
          </svg>
        </div>
        <div class="header-text-group">
          <h1 class="page-title">Property Setup</h1>
        </div>
      </div>
      
      <!-- Action Area: Search & Add -->
      <div class="header-search-section">
        <label class="form-label erp-label">Property ID</label>
        <div class="erp-input-group">
          <div class="erp-input-wrapper">
            <span class="input-icon">
              <!-- Inline Search SVG Icon -->
              <svg xmlns="http://www.w3.org/2000/svg" class="icon-svg-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
              </svg>
            </span>
            <input
              type="text"
              class="form-control erp-input"
              [(ngModel)]="propertyId"
              placeholder="Enter Property Code...">
          </div>
          
           <!-- Search Button -->
              <button type="button" class="nav-btn" title="Search" (click)="onSearch()">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                  <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.867-3.834zM12 6.5a5.5 5.5 0 1 1-11 0a5.5 5.5 0 0 1 11 0"/>
                </svg>
              </button>

             
              
        </div>
      </div>
      
      <!-- Status Option -->
      <div class="header-status-section">
        <div class="status-toggle-card" [class.is-inactive]="inactive">
          <div class="form-check form-switch m-0 d-flex align-items-center gap-2">
            <input
              class="form-check-input erp-switch"
              type="checkbox"
              id="masterInactiveSwitch"
              [(ngModel)]="inactive">
            <label class="form-check-label status-label" for="masterInactiveSwitch">
              {{ inactive ? 'Inactive Status' : 'Active Status' }}
            </label>
          </div>
        </div>
      </div>
    </div>
  </header>
  
  <!-- ERP Tabs Card -->
  <div class="erp-tabs-card">
    <div class="tabs-navigation-header">
      <ul class="nav erp-nav-tabs">
        <li class="nav-item">
          <button
            class="nav-link erp-tab-link"
            [class.active]="activeTab === 'property'"
            (click)="setTab('property')">
            <!-- Inline Home SVG Icon -->
            <svg xmlns="http://www.w3.org/2000/svg" class="icon-svg-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
            <span>Property Details</span>
          </button>
        </li>
        <li class="nav-item">
          <button
            class="nav-link erp-tab-link"
            [class.active]="activeTab === 'unit'"
            (click)="setTab('unit')">
            <!-- Inline Layout Grid SVG Icon -->
            <svg xmlns="http://www.w3.org/2000/svg" class="icon-svg-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
            </svg>
            <span>Units List</span>
          </button>
        </li>
        
      </ul>
    </div>
    <!-- Tab Contents -->
    <div class="tabs-content-body">
      <!-- Property Tab -->
      <div *ngIf="activeTab === 'property'" class="tab-fade-in">
        <app-property></app-property>
      </div>
      <!-- Unit Tab -->
      <div *ngIf="activeTab === 'unit'" class="tab-fade-in">
        <app-unit></app-unit>
      </div>
      <!-- Document Tab -->
      
    </div>
  </div>
</div>
