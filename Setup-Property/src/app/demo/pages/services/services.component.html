<div class="erp-container">

  <!-- ===================== PAGE HEADER ===================== -->
  <div class="erp-header">
    <div class="header-left">
      <h1 class="page-title">Service Management</h1>
    </div>
  </div>

  <!-- ===================== FORM ===================== -->
  <form #serviceForm="ngForm" (ngSubmit)="onSave(serviceForm)" novalidate>

    <!-- Service Details Card -->
    <div class="erp-card">
      <div class="erp-card-header">
        <div class="header-icon-title">
          <div class="icon-wrapper">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="currentColor" viewBox="0 0 16 16">
              <path d="M8 4.754a3.246 3.246 0 1 0 0 6.492a3.246 3.246 0 0 0 0-6.492z"/>
              <path d="M5.754.246a.5.5 0 0 1 .492 0l.826.475a1 1 0 0 0 .928 0l.826-.475a.5.5 0 0 1 .492 0l1.5.866a.5.5 0 0 1 .242.434l-.02.952a1 1 0 0 0 .464.857l.806.53a.5.5 0 0 1 .182.683l-.75 1.299a1 1 0 0 0 0 .99l.75 1.299a.5.5 0 0 1-.182.683l-.806.53a1 1 0 0 0-.464.857l.02.952a.5.5 0 0 1-.242.434l-1.5.866a.5.5 0 0 1-.492 0l-.826-.475a1 1 0 0 0-.928 0l-.826.475a.5.5 0 0 1-.492 0l-1.5-.866a.5.5 0 0 1-.242-.434l.02-.952a1 1 0 0 0-.464-.857l-.806-.53a.5.5 0 0 1-.182-.683l.75-1.299a1 1 0 0 0 0-.99l-.75-1.299a.5.5 0 0 1 .182-.683l.806-.53a1 1 0 0 0 .464-.857l-.02-.952a.5.5 0 0 1 .242-.434l1.5-.866z"/>
            </svg>
          </div>
          <div class="header-text-group">
            <h2 class="card-title">Service details</h2>
          </div>
        </div>

        <!-- Active / Inactive status toggle -->
        <div class="status-toggle-wrapper">
          <button
            type="button"
            class="erp-btn erp-status-btn"
            [class.erp-status-btn--active]="model.isActive"
            [class.erp-status-btn--inactive]="!model.isActive"
            (click)="model.isActive = !model.isActive"
          >
            <i class="bi" [class.bi-check-circle-fill]="model.isActive" [class.bi-x-circle-fill]="!model.isActive"></i>
            {{ model.isActive ? 'Active' : 'Inactive' }}
          </button>
        </div>
      </div>

      <div class="erp-card-body">

        <!-- ===================== Row 1: Service Mode ===================== -->
        <div class="row mb-3">
          <div class="col-md-5">
            <label class="erp-label" for="serviceMode">
              Service Mode <span class="required-star">*</span>
            </label>

            <div class="erp-input-wrapper">
              <span class="input-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                  <path d="M8 1L1 5l7 4 7-4-7-4zm0 5.2L2.7 5 8 2l5.3 3L8 6.2zm-7 1.8l7 4 7-4v2l-7 4-7-4V8zm0 3l7 4 7-4v2l-7 4-7-4v-2z"/>
                </svg>
              </span>

              <select
                id="serviceMode"
                name="serviceMode"
                class="erp-input erp-select"
                [(ngModel)]="model.serviceMode"
                #serviceModeRef="ngModel"
                (ngModelChange)="onServiceModeChange()"
                required>
                <option value="">Select Mode</option>
                <option value="rent">Rent</option>
                <option value="sale">Sale</option>
                <option value="lease">Lease</option>
                <option value="maintenance">Maintenance</option>
                <option value="subscription">Subscription</option>
              </select>
            </div>

            <div class="erp-field-error" *ngIf="serviceModeRef.invalid && serviceModeRef.touched">
              Service mode is required.
            </div>
          </div>
        </div>

        <!-- ===================== Row 2: Service Type (+ search/add) + Description ===================== -->
        <div class="row mb-3">

          <!-- Service Type -->
          <div class="col-md-6">
            <label class="erp-label" for="serviceType">
              Service type <span class="required-star">*</span>
            </label>

            <div class="service-type-nav">
              <div class="erp-input-wrapper flex-grow-1">
                <span class="input-icon">
                  <i class="bi bi-tag"></i>
                </span>
                <input
                  type="text"
                  id="serviceType"
                  name="serviceType"
                  class="erp-input"
                  placeholder="e.g. SVC-001"
                  [(ngModel)]="model.serviceType"
                  #serviceTypeRef="ngModel"
                  required
                  maxlength="50"
                />
              </div>

              <!-- Search Button -->
              <button type="button" class="nav-btn" title="Search" (click)="onSearch()">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                  <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.867-3.834zM12 6.5a5.5 5.5 0 1 1-11 0a5.5 5.5 0 0 1 11 0"/>
                </svg>
              </button>

              <!-- Add Button -->
              <button type="button" class="nav-btn nav-btn--add" title="New Service" (click)="onNew()">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                  <path fill-rule="evenodd" d="M8 2a.5.5 0 0 1 .5.5v5h5a.5.5 0 0 1 0 1h-5v5a.5.5 0 0 1-1 0v-5h-5a.5.5 0 0 1 0-1h5v-5A.5.5 0 0 1 8 2"/>
                </svg>
              </button>
            </div>

            <div class="erp-field-error" *ngIf="serviceTypeRef.invalid && serviceTypeRef.touched">
              Service type is required.
            </div>
          </div>

          <!-- Description: matched height to the service-type input row -->
          <div class="col-md-6">
            <label class="erp-label" for="description">Description</label>
            <div class="erp-input-wrapper erp-input-wrapper--single-line">
              <span class="input-icon"><i class="bi bi-text-left"></i></span>
              <input
                type="text"
                id="description"
                name="description"
                class="erp-input"
                placeholder="Describe this service type…"
                [(ngModel)]="model.description"
              />
            </div>
          </div>
        </div>

        <!-- ===================== Row 3: Revenue Account ===================== -->
        <div class="row mb-3">
          <div class="col-12">
            <label class="erp-label" for="revenueAccountCode">Revenue Account</label>

            <div class="account-lookup-row">

              <!-- Account Code -->
              <div class="account-code">
                <div class="erp-input-wrapper">
                  <span class="input-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                      <path d="M14 4.5V14a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1h7.5L14 4.5z"/>
                      <path d="M10.5 1v3a.5.5 0 0 0 .5.5h3"/>
                      <path d="M4 7h8M4 9h8M4 11h5" stroke="currentColor" stroke-width="1" fill="none"/>
                    </svg>
                  </span>
                  <input
                    type="text"
                    id="revenueAccountCode"
                    name="revenueAccountCode"
                    class="erp-input"
                    placeholder="Code"
                    [(ngModel)]="model.revenueAccountCode"
                    (blur)="resolveAccountName('revenue')">
                </div>
              </div>

              <!-- Search Button -->
              <button type="button" class="nav-btn" title="Search" (click)="onSearch()">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                  <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.867-3.834zM12 6.5a5.5 5.5 0 1 1-11 0a5.5 5.5 0 0 1 11 0"/>
                </svg>
              </button>

              <!-- Account Name -->
              <div class="account-name">
                {{ model.revenueAccountName || 'Select an account...' }}
              </div>

            </div>
          </div>
        </div>

        <!-- ===================== Row 4: Recurring Entry Toggle (rent only) ===================== -->
        <div class="row mb-2" *ngIf="model.serviceMode === 'rent'">
          <div class="col-12">
            <div class="erp-checkbox-row">
              <input
                type="checkbox"
                id="recurringEntry"
                name="recurringEntry"
                class="erp-checkbox"
                [(ngModel)]="model.recurringEntry"
              />
              <label for="recurringEntry" class="erp-checkbox-label">Recurring entry</label>
            </div>
          </div>
        </div>

        <!-- ===================== Row 5: Recurring Account (rent + checked) ===================== -->
        <!-- Styled identically to the Revenue Account row above -->
        <div
          class="recurring-section"
          [class.visible]="model.serviceMode === 'rent' && model.recurringEntry"
          *ngIf="model.serviceMode === 'rent' && model.recurringEntry"
        >
          <div class="recurring-section-inner">

            <!-- Recurring Account: code -> search -> name, same row pattern -->
            <div class="row mb-3">
              <div class="col-12">
                <label class="erp-label" for="recurringAccountCode">Recurring Account</label>

                <div class="account-lookup-row">

                  <!-- Account Code -->
                  <div class="account-code">
                    <div class="erp-input-wrapper">
                      <span class="input-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                          <path d="M14 4.5V14a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1h7.5L14 4.5z"/>
                          <path d="M10.5 1v3a.5.5 0 0 0 .5.5h3"/>
                          <path d="M4 7h8M4 9h8M4 11h5" stroke="currentColor" stroke-width="1" fill="none"/>
                        </svg>
                      </span>
                      <input
                        type="text"
                        id="recurringAccountCode"
                        name="recurringAccountCode"
                        class="erp-input"
                        placeholder="Code"
                        [(ngModel)]="model.recurringAccountCode"
                        (blur)="resolveAccountName('recurring')">
                    </div>
                  </div>

                  <!-- Search Button -->
                  <button type="button" class="nav-btn" title="Search" (click)="onSearch()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                      <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.867-3.834zM12 6.5a5.5 5.5 0 1 1-11 0a5.5 5.5 0 0 1 11 0"/>
                    </svg>
                  </button>

                  <!-- Account Name -->
                  <div class="account-name">
                    {{ model.recurringAccountName || 'Select an account...' }}
                  </div>

                </div>
              </div>
            </div>

            <!-- Recurring Frequency -->
            

          </div>
        </div>

      </div><!-- /erp-card-body -->
    </div><!-- /erp-card -->

    <!-- ===================== FOOTER ACTIONS ===================== -->
    <div class="erp-actions-footer">
      <div class="left-actions">
        <button
          type="button"
          class="erp-btn erp-btn-danger"
          [disabled]="isNew"
          (click)="onDelete()"
        >
          <i class="bi bi-trash3"></i> Delete
        </button>
      </div>
      <div class="right-actions">
        <button type="button" class="erp-btn erp-btn-secondary" (click)="onClose()">
          <i class="bi bi-x-lg"></i> Close
        </button>
        <button type="submit" class="erp-btn erp-btn-primary">
          <i class="bi bi-floppy"></i> Save
        </button>
      </div>
    </div>

  </form>

  <!-- ===================== TOAST ===================== -->
  <div class="erp-toast" [class.erp-toast--show]="toast.visible" [class.erp-toast--danger]="toast.type === 'danger'">
    <i class="bi" [class.bi-check-circle-fill]="toast.type === 'success'" [class.bi-exclamation-circle-fill]="toast.type === 'danger'"></i>
    {{ toast.message }}
  </div>

</div>
